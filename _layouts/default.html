<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.author.name }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <header class="site-header">
    <nav class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-home">
        <span class="nav-name">{{ site.author.name }}</span>
        <span class="nav-role">Systems Engineering Portfolio</span>
      </a>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}#projects">Projects</a></li>
        <li><a href="{{ '/about/' | relative_url }}">About</a></li>
        <li><a href="https://github.com/cameron-murr" target="_blank" rel="noopener" class="nav-github">GitHub ↗</a></li>
      </ul>
    </nav>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-note">Built with Jekyll. Hosted on GitHub Pages. All artifacts are original work.</p>
      <p class="footer-note">Philadelphia → San Francisco Bay Area, 2026</p>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
